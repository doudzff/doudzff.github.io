<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K O U D A - روابطي</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .profile-section {
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        .status-dot {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: #4ade80;
            border: 3px solid white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
        }

        .name {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .bio {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .links-section {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: white;
            border-radius: 16px;
            text-decoration: none;
            color: #374151;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: #667eea;
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .link-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .link-card:hover::before {
            transform: scaleY(1);
        }

        .link-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }

        .facebook { background: #1877f2; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .telegram { background: #0088cc; }
        .whatsapp { background: #25d366; }

        .link-text {
            flex: 1;
            text-align: right;
        }

        .link-arrow {
            color: #9ca3af;
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .link-card:hover .link-arrow {
            transform: translateX(-5px);
            color: #667eea;
        }

        .footer {
            margin-top: 30px;
            position: relative;
            z-index: 1;
            color: #9ca3af;
            font-size: 13px;
        }

        .share-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.8);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            font-size: 18px;
            transition: all 0.3s ease;
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .share-btn:hover {
            background: #667eea;
            color: white;
            transform: rotate(180deg);
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            
            .name {
                font-size: 24px;
            }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <button class="share-btn" onclick="shareProfile()" title="مشاركة">
            <i class="fas fa-share-alt"></i>
        </button>

        <div class="profile-section">
            <div class="avatar-wrapper">
                <img src="https://i.imgur.com/fGgcTQv.jpg" 
                     alt="K O U D A" 
                     class="avatar">
                <div class="status-dot"></div>
            </div>
            
            <h1 class="name">K O U D A</h1>
            <p class="bio">📩 للتواصل والإعلانات</p>
        </div>

        <div class="links-section">
            <a href="https://www.facebook.com/KOUDAST%20LM" class="link-card" target="_blank">
                <div class="link-icon facebook">
                    <i class="fab fa-facebook-f"></i>
                </div>
                <span class="link-text">فيسبوك</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>

            <a href="https://www.instagram.com/____1C__" class="link-card" target="_blank">
                <div class="link-icon instagram">
                    <i class="fab fa-instagram"></i>
                </div>
                <span class="link-text">إنستغرام</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>

            <a href="https://t.me/KOUDAST_MK4" class="link-card" target="_blank">
                <div class="link-icon telegram">
                    <i class="fab fa-telegram-plane"></i>
                </div>
                <span class="link-text">تيليجرام</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>

            <a href="https://wa.me/213561104533" class="link-card" target="_blank">
                <div class="link-icon whatsapp">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <span class="link-text">واتساب</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>
        </div>

        <div class="footer">
            <p>Made with <i class="fas fa-heart" style="color: #e74c3c;"></i> by K O U D A</p>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: 'K O U D A',
                    text: 'تفضل بزيارة روابطي!',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('تم نسخ الرابط!');
                });
            }
        }

        window.addEventListener('load', () => {
            createParticles();
            
            document.querySelector('.container').style.opacity = '0';
            document.querySelector('.container').style.transform = 'translateY(30px)';
            setTimeout(() => {
                document.querySelector('.container').style.transition = 'all 0.8s ease';
                document.querySelector('.container').style.opacity = '1';
                document.querySelector('.container').style.transform = 'translateY(0)';
            }, 100);
        });

        document.querySelectorAll('.link-card').forEach(link => {
            link.addEventListener('click', function(e) {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    </script>
</body>
</html>
