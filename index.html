<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K O U D A - روابطي</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* دخان نيون بنفسجي */
        .smoke {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .smoke-particle {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: smokeFloat 8s infinite ease-in-out;
        }

        .smoke-particle:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
            width: 300px;
            height: 300px;
        }

        .smoke-particle:nth-child(2) {
            top: 60%;
            right: 10%;
            animation-delay: 2s;
            width: 250px;
            height: 250px;
        }

        .smoke-particle:nth-child(3) {
            bottom: 10%;
            left: 30%;
            animation-delay: 4s;
            width: 350px;
            height: 350px;
        }

        .smoke-particle:nth-child(4) {
            top: 30%;
            right: 30%;
            animation-delay: 6s;
            width: 200px;
            height: 200px;
        }

        @keyframes smokeFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.3;
            }
            33% {
                transform: translate(30px, -30px) scale(1.2);
                opacity: 0.6;
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
                opacity: 0.4;
            }
        }

        /* خطوط نيون */
        .neon-line {
            position: fixed;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #9333ea, transparent);
            opacity: 0.5;
            animation: neonPulse 3s infinite;
        }

        .neon-line:nth-child(1) { left: 10%; animation-delay: 0s; }
        .neon-line:nth-child(2) { left: 30%; animation-delay: 1s; }
        .neon-line:nth-child(3) { right: 20%; animation-delay: 2s; }
        .neon-line:nth-child(4) { right: 5%; animation-delay: 0.5s; }

        @keyframes neonPulse {
            0%, 100% { opacity: 0.3; box-shadow: 0 0 5px #9333ea; }
            50% { opacity: 0.8; box-shadow: 0 0 20px #9333ea, 0 0 40px #9333ea; }
        }

        .container {
            background: rgba(30, 30, 46, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            border: 2px solid rgba(147, 51, 234, 0.3);
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.2), 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #9333ea, #e879f9, #9333ea, transparent);
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .profile-section {
            position: relative;
            z-index: 1;
            margin-bottom: 30px;
        }

        /* إطار كونكر ببجي */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar-border {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                #ffd700 0deg,
                #ffed4e 60deg,
                #ffd700 120deg,
                #b8860b 180deg,
                #ffd700 240deg,
                #ffed4e 300deg,
                #ffd700 360deg
            );
            animation: conkerRotate 4s linear infinite;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .avatar-border::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border-radius: 50%;
            background: #1a1a2e;
        }

        @keyframes conkerRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .avatar {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            z-index: 2;
        }

        .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 20px;
            height: 20px;
            background: #4ade80;
            border: 3px solid #1a1a2e;
            border-radius: 50%;
            animation: pulse 2s infinite;
            z-index: 3;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
        }

        .name {
            font-size: 32px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 3px;
        }

        .bio {
            font-size: 16px;
            color: #a78bfa;
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: 700;
        }

        .links-section {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(30, 30, 46, 0.8);
            border-radius: 12px;
            text-decoration: none;
            color: #e2e8f0;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
            border: 1px solid rgba(147, 51, 234, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(to bottom, #9333ea, #e879f9);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .link-card:hover {
            transform: translateX(-5px);
            box-shadow: 0 8px 25px rgba(147, 51, 234, 0.3);
            border-color: #9333ea;
            background: rgba(147, 51, 234, 0.1);
        }

        .link-card:hover::before {
            transform: scaleY(1);
        }

        .link-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .link-icon::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
        }

        .facebook { background: linear-gradient(135deg, #1877f2, #0d5cb6); }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .telegram { background: linear-gradient(135deg, #0088cc, #005580); }
        .whatsapp { background: linear-gradient(135deg, #25d366, #128c7e); }

        .link-text {
            flex: 1;
            text-align: right;
        }

        .link-arrow {
            color: #9333ea;
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .link-card:hover .link-arrow {
            transform: translateX(-5px);
            color: #e879f9;
        }

        .footer {
            margin-top: 30px;
            position: relative;
            z-index: 1;
            color: #64748b;
            font-size: 13px;
            font-weight: 700;
        }

        .share-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(147, 51, 234, 0.2);
            border: 1px solid rgba(147, 51, 234, 0.5);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9333ea;
            font-size: 18px;
            transition: all 0.3s ease;
            z-index: 2;
            backdrop-filter: blur(10px);
        }

        .share-btn:hover {
            background: #9333ea;
            color: white;
            transform: rotate(180deg);
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.5);
        }

        .glow-text {
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #9333ea, 0 0 10px #9333ea; }
            to { text-shadow: 0 0 20px #9333ea, 0 0 30px #9333ea, 0 0 40px #e879f9; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                border-radius: 15px;
            }
            
            .name {
                font-size: 26px;
            }
            
            .avatar {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="smoke">
        <div class="smoke-particle"></div>
        <div class="smoke-particle"></div>
        <div class="smoke-particle"></div>
        <div class="smoke-particle"></div>
    </div>

    <div class="neon-line"></div>
    <div class="neon-line"></div>
    <div class="neon-line"></div>
    <div class="neon-line"></div>
    
    <div class="container">
        <button class="share-btn" onclick="shareProfile()" title="مشاركة">
            <i class="fas fa-share-alt"></i>
        </button>

        <div class="profile-section">
            <div class="avatar-wrapper">
                <div class="avatar-border"></div>
                <img src="https://doudzff.github.io/IMG_0314.png" 
                     alt="K O U D A" 
                     class="avatar">
                <div class="status-dot"></div>
            </div>
            
            <h1 class="name glow-text">K O U D A</h1>
            <p class="bio">📩 للتواصل </p>
        </div>

        <div class="links-section">
            <a href="https://www.facebook.com/KOUDAST%20LM" class="link-card" target="_blank">
                <div class="link-icon facebook">
                    <i class="fab fa-facebook-f"></i>
                </div>
                <span class="link-text">فيسبوك</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>

            <a href="https://www.instagram.com/____1C__" class="link-card" target="_blank">
                <div class="link-icon instagram">
                    <i class="fab fa-instagram"></i>
                </div>
                <span class="link-text">إنستغرام</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>

            <a href="https://t.me/KOUDAST_MK4" class="link-card" target="_blank">
                <div class="link-icon telegram">
                    <i class="fab fa-telegram-plane"></i>
                </div>
                <span class="link-text">تيليجرام</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>

            <a href="https://wa.me/213561104533" class="link-card" target="_blank">
                <div class="link-icon whatsapp">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <span class="link-text">واتساب</span>
                <i class="fas fa-chevron-left link-arrow"></i>
            </a>
        </div>

        <div class="footer">
            <p>Made with <i class="fas fa-heart" style="color: #e74c3c;"></i> by K O U D A</p>
        </div>
    </div>

    <script>
        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: 'K O U D A',
                    text: 'تفضل بزيارة روابطي!',
                    url: window.location.href
                });
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('تم نسخ الرابط!');
                });
            }
        }

        window.addEventListener('load', () => {
            document.querySelector('.container').style.opacity = '0';
            document.querySelector('.container').style.transform = 'translateY(30px)';
            setTimeout(() => {
                document.querySelector('.container').style.transition = 'all 0.8s ease';
                document.querySelector('.container').style.opacity = '1';
                document.querySelector('.container').style.transform = 'translateY(0)';
            }, 100);
        });

        document.querySelectorAll('.link-card').forEach(link => {
            link.addEventListener('click', function(e) {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
            });
        });
    </script>
</body>
    </html>
